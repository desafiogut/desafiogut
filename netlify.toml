[build]
  base = "desafio-gut/frontend"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://auth.privy.io; connect-src 'self' https://auth.privy.io https://eth-sepolia.g.alchemy.com; img-src 'self' data: https://*.privy.io; frame-src 'self' https://auth.privy.io; style-src 'self' 'unsafe-inline';"
