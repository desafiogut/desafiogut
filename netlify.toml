[build]
  base    = "desafio-gut/frontend"
  command = "npm install --legacy-peer-deps && npm install --prefix netlify/functions --legacy-peer-deps && npm run build"
  publish = "dist"

# ── Secrets scanning ─────────────────────────────────────────────────────────
# O Netlify falha o build se o VALOR de uma env var aparecer no output. Estas
# chaves têm valores PÚBLICOS que aparecem legitimamente no build (endereços de
# contrato, RPCs, IDs VITE_/Biconomy) — são omitidas. As chaves REALMENTE secretas
# (JWT_SECRET, COORDENACAO_PRIVATE_KEY, APP_AWS_SECRET_ACCESS_KEY, ADMIN_TOKEN,
# MP_ACCESS_TOKEN, KMS_KEY_ID, MC302_DIAG_TOKEN, BICONOMY_API_KEY, tokens LLM/HF)
# CONTINUAM a ser verificadas — se alguma vazar para o build, o deploy falha (correto).
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "CONTRATO_SEPOLIA,RPC_URL,BICONOMY_BUNDLER_URL,BICONOMY_PROJECT_ID,VITE_CONTRATO_SEPOLIA,VITE_CONTRACT_ADDRESS,VITE_ALCHEMY_URL,VITE_RPC_URL_SEPOLIA,VITE_PRIVY_APP_ID,VITE_WC_PROJECT_ID,VITE_SENTRY_DSN,VITE_MOCK_MODE,SENTRY_DNS"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "true"

# ── Netlify Functions ────────────────────────────────────────────────────────
# Resolvido como `desafio-gut/frontend/netlify/functions/` (relativo ao base).
# `node_bundler = "esbuild"` permite que cada função declare deps em
# netlify/functions/package.json e serem bundled inline (jose, ethers, etc).
[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"
  # MC9.1 — @xenova/transformers é usado APENAS no script local build:rag; em
  # runtime Lambda gerarEmbedding usa a Hugging Face Inference API por HTTP.
  #
  # Já NÃO está em external_node_modules (fix do deploy 2026-06-19): externalizá-lo
  # fazia o zip-it FORÇAR a sua inclusão (+ onnxruntime/sharp, ~270MB) em TODAS as
  # scheduled functions, estourando o limite de 50MB da AWS Lambda ("Invalid AWS
  # Lambda parameters"). Em _lib/rag.mjs o import passou a ter especificador
  # COMPUTADO (não literal), pelo que o esbuild já não tenta empacotá-lo (nem ao
  # `sharp` nativo) e não o inclui em função nenhuma. Resultado: 0 funções >50MB.

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Cache-bust agressivo do HTML ─────────────────────────────────────────────
# index.html nunca deve ser cacheado por CDN/browser, senão clientes ficam
# presos em deploys antigos com CSP velha. Os assets /assets/*.js já têm
# hash no nome (immutable cache safe).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── CSP + headers de segurança ───────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options          = "nosniff"
    X-Frame-Options                 = "SAMEORIGIN"
    Referrer-Policy                 = "strict-origin-when-cross-origin"
    Strict-Transport-Security       = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy      = "same-origin-allow-popups"
    # MC11.18 — COEP removido: bloqueava iframe do Privy Embedded Wallet
    # (auth.privy.io/apps/.../embedded-wallets → ERR_BLOCKED_BY_RESPONSE).
    # O COEP "credentialless" exige que recursos cross-origin tenham CORP header;
    # o Privy não envia CORP no iframe, causando bloqueio e falha de carteira.
    # Sem COEP, o iframe carrega normalmente. CORP "same-origin" mantido.
    Cross-Origin-Resource-Policy    = "same-origin"
    Permissions-Policy              = "camera=(), microphone=(), geolocation=()"
    # NOTE: CSP frame-ancestors NÃO controla o que NÓS framamos — controla quem
    # pode framar nosso site. Quem nós podemos framar é controlado por frame-src
    # (e child-src como fallback). O erro "Framing https://auth.privy.io/
    # violates frame-ancestors" vem da resposta do PRÓPRIO auth.privy.io e não
    # pode ser revertido pelo nosso CSP — é necessário usar URL embedável Privy.
    # Mantemos auth.privy.io explícito em frame-src + child-src para garantir.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://privy.io https://*.privy.io https://auth.privy.io https://accounts.google.com https://apis.google.com https://*.gstatic.com https://challenges.cloudflare.com https://hcaptcha.com https://*.hcaptcha.com https://walletconnect.com https://*.walletconnect.com https://*.walletconnect.org; style-src 'self' 'unsafe-inline' https://accounts.google.com https://hcaptcha.com https://*.hcaptcha.com https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://privy.io https://*.privy.io https://auth.privy.io https://silly-stardust-ca71bc.netlify.app https://*.gstatic.com https://*.googleusercontent.com https://*.walletconnect.com; child-src 'self' https://privy.io https://*.privy.io https://auth.privy.io https://accounts.google.com https://*.google.com https://hcaptcha.com https://*.hcaptcha.com https://challenges.cloudflare.com; frame-src 'self' https://privy.io https://*.privy.io https://auth.privy.io https://accounts.google.com https://*.google.com https://hcaptcha.com https://*.hcaptcha.com https://challenges.cloudflare.com https://verify.walletconnect.com https://verify.walletconnect.org; connect-src 'self' http://127.0.0.1:8545 https://privy.io https://*.privy.io https://auth.privy.io wss://*.privy.io https://*.rpc.privy.systems https://telemetry.privy.io https://api.privy.io https://accounts.google.com https://*.googleapis.com https://hcaptcha.com https://*.hcaptcha.com https://eth-sepolia.g.alchemy.com https://rpc.sepolia.org https://ethereum-sepolia-rpc.publicnode.com https://explorer-api.walletconnect.com https://*.walletconnect.com https://*.walletconnect.org wss://*.walletconnect.com wss://*.walletconnect.org https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://*.ingest.de.sentry.io; worker-src 'self' blob:; object-src 'none'; base-uri 'self';"
